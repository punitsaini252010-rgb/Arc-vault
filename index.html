    <style>
        :root {
            /* Old Money Brown Theme */
            --bg-deep: #2c1e12;
            --bg-mid: #4b3621;
            --bg-light: #5C4033;
            /* Pure Liquid Gold */
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #b38728, #FBF5B7, #AA771C);
            /* Accent Colors */
            --racing-green: #004225;
            --vibrant-red: #FF003C;
            --pure-cyan: #00FFFF;
            --pure-white: #FFFFFF;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-deep));
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography & Aesthetics */
        .old-money-heading {
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 15px rgba(212, 175, 55, 0.2);
        }

        .gold-border {
            border: 1px solid #AA771C;
            box-shadow: 0 0 10px rgba(191, 149, 63, 0.3);
        }

        /* 3D Levitation & Magic */
        .levitate {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }

        /* Scroll Reveal Magic */
        .fly-in {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .fly-in.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Kinetic Click Reaction */
        .click-ripple {
            position: fixed;
            border-radius: 50%;
            border: 2px solid var(--pure-cyan);
            box-shadow: 0 0 20px var(--pure-cyan);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 9999;
        }
        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        /* Sidebar UI */
        .sidebar-panel {
            background: rgba(44, 30, 18, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(191, 149, 63, 0.2);
        }

        .nav-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(191,149,63,0.1) 0%, transparent 100%);
            border-left: 3px solid #D4AF37;
            color: #D4AF37;
        }
        .nav-item:hover:not(.locked) {
            background: rgba(255,255,255,0.05);
            transform: translateX(5px);
        }
        .locked {
            opacity: 0.5;
            cursor: not-allowed;
            color: #888;
        }

        /* Scrollbar hiding */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #AA771C; border-radius: 10px; }

        /* Security Gate */
        #security-gate {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
    </style>

            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
